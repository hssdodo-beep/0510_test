<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스티커 메모장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .memo-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .memo-card:hover {
            transform: translateY(-4px) rotate(-1deg);
        }

        .tape-effect {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg);
            width: 64px;
            height: 32px;
            background-color: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-animate {
            animation: modal-in 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div id="app" class="p-4 md:p-8 max-w-6xl mx-auto">
        <!-- 헤더 섹션 -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 flex items-center gap-3">
                    <span class="bg-yellow-400 w-8 h-8 rounded shadow-sm inline-block"></span>
                    스티커 메모장
                </h1>
                <p class="text-slate-500 mt-1">중요한 생각을 제목과 함께 기록해보세요.</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <!-- 검색 -->
                <div class="relative flex-1 md:flex-none">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="검색..." 
                        class="pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 w-full md:w-56 transition-all"
                    >
                </div>

                <!-- 정렬 버튼 -->
                <button 
                    id="sortBtn"
                    class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-full text-sm font-medium hover:bg-slate-50 transition-colors whitespace-nowrap"
                >
                    <i data-lucide="arrow-up-down" class="w-4 h-4"></i>
                    <span id="sortLabel">최신순</span>
                </button>

                <!-- 추가 버튼 -->
                <button 
                    onclick="openModal()"
                    class="flex items-center gap-2 px-6 py-2 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold rounded-full shadow-lg shadow-yellow-200 transition-all active:scale-95"
                >
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    새 메모
                </button>
            </div>
        </header>

        <!-- 메모 그리드 -->
        <div id="memoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- 메모 카드들이 여기에 동적으로 생성됩니다 -->
        </div>

        <!-- 빈 상태 표시 -->
        <div id="emptyState" class="hidden py-20 text-center text-slate-400 col-span-full">
            <p class="text-lg">등록된 메모가 없습니다.</p>
        </div>
    </div>

    <!-- 작성/수정 모달 -->
    <div id="modalOverlay" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden modal-animate">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <h3 id="modalTitle" class="font-bold text-slate-800">새로운 메모 작성</h3>
                <button onclick="closeModal()" class="p-1 hover:bg-slate-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                </button>
            </div>
            
            <form id="memoForm" class="p-6 space-y-4">
                <input type="hidden" id="editMemoId">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">제목</label>
                    <input
                        type="text"
                        id="memoTitleInput"
                        placeholder="제목을 입력하세요 (선택)"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all font-bold text-slate-800"
                    >
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">내용</label>
                    <textarea
                        id="memoContentInput"
                        placeholder="메모 내용을 입력하세요..."
                        class="w-full h-48 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all resize-none text-lg text-slate-700"
                    ></textarea>
                </div>
            </form>

            <div class="px-6 py-4 bg-slate-50 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-5 py-2 text-slate-600 font-medium hover:bg-slate-200 rounded-lg transition-colors">취소</button>
                <button 
                    onclick="saveMemo()"
                    class="flex items-center gap-2 px-6 py-2 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold rounded-lg shadow-md transition-all active:scale-95"
                >
                    <i data-lucide="check" class="w-5 h-5"></i>
                    저장하기
                </button>
            </div>
        </div>
    </div>

    <script>
        // 초기 데이터 및 상태
        const STICKER_COLORS = [
            'bg-yellow-100 border-yellow-200 text-yellow-900',
            'bg-pink-100 border-pink-200 text-pink-900',
            'bg-blue-100 border-blue-200 text-blue-900',
            'bg-green-100 border-green-200 text-green-900',
            'bg-orange-100 border-orange-200 text-orange-900',
            'bg-purple-100 border-purple-200 text-purple-900',
        ];

        let memos = [
            {
                id: 1,
                title: '환영합니다! 👋',
                content: '제목과 내용을 자유롭게 기록해보세요.',
                color: STICKER_COLORS[0],
                createdAt: new Date().toISOString()
            }
        ];

        let sortOrder = 'latest'; // 'latest', 'oldest', 'title'
        let searchTerm = '';

        // DOM 요소
        const memoGrid = document.getElementById('memoGrid');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const sortBtn = document.getElementById('sortBtn');
        const sortLabel = document.getElementById('sortLabel');
        const modalOverlay = document.getElementById('modalOverlay');
        const memoForm = document.getElementById('memoForm');

        // 초기화
        function init() {
            lucide.createIcons();
            renderMemos();
            
            // 이벤트 바인딩
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderMemos();
            });

            sortBtn.addEventListener('click', toggleSort);
        }

        // 정렬 기능
        function toggleSort() {
            if (sortOrder === 'latest') sortOrder = 'oldest';
            else if (sortOrder === 'oldest') sortOrder = 'title';
            else sortOrder = 'latest';
            
            const labels = { 'latest': '최신순', 'oldest': '오래된순', 'title': '제목순' };
            sortLabel.textContent = labels[sortOrder];
            renderMemos();
        }

        // 메모 렌더링
        function renderMemos() {
            let filtered = memos.filter(m => 
                m.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                m.content.toLowerCase().includes(searchTerm.toLowerCase())
            );

            filtered.sort((a, b) => {
                if (sortOrder === 'latest') return new Date(b.createdAt) - new Date(a.createdAt);
                if (sortOrder === 'oldest') return new Date(a.createdAt) - new Date(b.createdAt);
                if (sortOrder === 'title') return a.title.localeCompare(b.title, 'ko');
                return 0;
            });

            memoGrid.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach(memo => {
                    const card = document.createElement('div');
                    card.className = `${memo.color} memo-card p-6 rounded-sm shadow-md border-t-8 h-72 flex flex-col relative group cursor-default`;
                    
                    const dateStr = new Date(memo.createdAt).toLocaleDateString('ko-KR');
                    
                    card.innerHTML = `
                        <div class="tape-effect"></div>
                        <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="openModal(${memo.id})" class="p-1.5 hover:bg-white/40 rounded-full"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="deleteMemo(${memo.id})" class="p-1.5 hover:bg-white/40 rounded-full text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <h2 class="text-xl font-bold mb-3 pr-8 truncate border-b border-black/5 pb-1">${memo.title}</h2>
                        <div class="flex-1 overflow-y-auto whitespace-pre-wrap text-base leading-relaxed scrollbar-hide opacity-90">${memo.content}</div>
                        <div class="mt-4 text-[10px] uppercase tracking-wider opacity-60 font-mono">${dateStr}</div>
                    `;
                    memoGrid.appendChild(card);
                });
            }
            lucide.createIcons();
        }

        // 모달 제어
        function openModal(id = null) {
            const modalTitle = document.getElementById('modalTitle');
            const titleInput = document.getElementById('memoTitleInput');
            const contentInput = document.getElementById('memoContentInput');
            const editId = document.getElementById('editMemoId');

            if (id) {
                const memo = memos.find(m => m.id === id);
                modalTitle.textContent = '메모 수정하기';
                editId.value = memo.id;
                titleInput.value = memo.title;
                contentInput.value = memo.content;
            } else {
                modalTitle.textContent = '새로운 메모 작성';
                editId.value = '';
                titleInput.value = '';
                contentInput.value = '';
            }

            modalOverlay.classList.remove('hidden');
            contentInput.focus();
        }

        function closeModal() {
            modalOverlay.classList.add('hidden');
        }

        // 메모 저장/수정
        function saveMemo() {
            const titleInput = document.getElementById('memoTitleInput');
            const contentInput = document.getElementById('memoContentInput');
            const editId = document.getElementById('editMemoId').value;

            if (!contentInput.value.trim()) return;

            if (editId) {
                // 수정
                memos = memos.map(m => m.id === parseInt(editId) ? {
                    ...m,
                    title: titleInput.value.trim() || '제목 없음',
                    content: contentInput.value
                } : m);
            } else {
                // 추가
                const randomColor = STICKER_COLORS[Math.floor(Math.random() * STICKER_COLORS.length)];
                memos.push({
                    id: Date.now(),
                    title: titleInput.value.trim() || '제목 없음',
                    content: contentInput.value,
                    color: randomColor,
                    createdAt: new Date().toISOString()
                });
            }

            closeModal();
            renderMemos();
        }

        // 메모 삭제
        function deleteMemo(id) {
            // 사용자 확인 대신 직관적인 삭제 (원하실 경우 confirm 추가 가능)
            memos = memos.filter(m => m.id !== id);
            renderMemos();
        }

        window.onload = init;
    </script>
</body>
</html>
